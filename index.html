<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armchair Insider Lounge — Weekly Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #C9A84C;
  --gold-lt:   #E8C97A;
  --gold-pale: #FBF5E6;
  --gold-dim:  #A07830;
  --ink:       #18150F;
  --ink-mid:   #3D3628;
  --ink-lt:    #7A6F5E;
  --surface:   #FDFCF8;
  --surface-2: #F5F0E6;
  --border:    #E2D8C2;
  --green:     #1F6B47;
  --red:       #8B1A1A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.header {
  background: var(--ink);
  background-image: radial-gradient(ellipse 80% 120% at 50% 200%, rgba(201,168,76,.20) 0%, transparent 65%);
  border-bottom: 1px solid rgba(201,168,76,.20);
  padding: 18px 32px 0;
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}

.logo {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(201,168,76,.4);
}

.header-title {
  flex: 1;
}

.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #fff;
  font-weight: 700;
  line-height: 1.2;
}

.header-title p {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .10em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 2px;
}

/* ══════════════════════════════
   TAB BUTTONS
══════════════════════════════ */
.tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-radius: 0;
  transition: all .18s;
  white-space: nowrap;
  position: relative;
  bottom: -1px;
}

.tab-btn:hover { background: rgba(255,255,255,.05); }

.tab-btn.active { border-bottom-color: var(--gold); background: rgba(201,168,76,.07); }

.tab-emoji {
  font-size: 20px;
  line-height: 1;
}

.tab-text {
  text-align: left;
}

.tab-name {
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,.5);
  display: block;
  line-height: 1.2;
  transition: color .18s;
}

.tab-desc {
  font-size: 11px;
  color: rgba(255,255,255,.28);
  display: block;
  margin-top: 1px;
  font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
  transition: color .18s;
}

.tab-btn.active .tab-name  { color: #fff; }
.tab-btn.active .tab-desc  { color: var(--gold); }
.tab-btn:hover  .tab-name  { color: rgba(255,255,255,.8); }

/* ══════════════════════════════
   IFRAME AREA
══════════════════════════════ */
.content {
  flex: 1;
  position: relative;
  background: var(--surface);
  overflow: hidden;
}

.panel {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}

.panel.active {
  opacity: 1;
  pointer-events: all;
}

.panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Loading overlay */
.loading {
  position: absolute;
  inset: 0;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 5;
  transition: opacity .3s;
}

.loading.done { opacity: 0; pointer-events: none; }

.loading-spinner {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--ink);
  animation: breathe 1.6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform: scale(1);    box-shadow: 0 4px 20px rgba(201,168,76,.3); }
  50%      { transform: scale(1.07); box-shadow: 0 8px 32px rgba(201,168,76,.55); }
}

.loading-msg {
  font-size: 15px;
  color: var(--ink-lt);
  font-weight: 500;
}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
.footer {
  background: rgba(24,21,15,.97);
  border-top: 1px solid rgba(201,168,76,.12);
  padding: 8px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}

.footer-left {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: .07em;
}

.footer-right {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,.22);
  text-align: right;
  letter-spacing: .04em;
}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media (max-width: 640px) {
  .header { padding: 14px 16px 0; }
  .header-title h1 { font-size: 16px; }
  .tab-btn { padding: 12px 14px 14px; gap: 7px; }
  .tab-name { font-size: 13px; }
  .tab-desc { display: none; }
  .footer { padding: 7px 16px; flex-direction: column; gap: 2px; text-align: center; }
  .footer-right { text-align: center; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">AI</div>
    <div class="header-title">
      <h1>Armchair Insider Lounge</h1>
      <p>Weekly Community Reports &nbsp;·&nbsp; May 2026</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" role="tablist">

    <button class="tab-btn active" role="tab" aria-selected="true"
            data-panel="panel-buy" onclick="show(this)">
      <span class="tab-emoji">📈</span>
      <span class="tab-text">
        <span class="tab-name">What We Bought</span>
        <span class="tab-desc">May 18 – 24, 2026</span>
      </span>
    </button>

    <button class="tab-btn" role="tab" aria-selected="false"
            data-panel="panel-sell" onclick="show(this)">
      <span class="tab-emoji">📉</span>
      <span class="tab-text">
        <span class="tab-name">What We Sold</span>
        <span class="tab-desc">May 11 – 24, 2026</span>
      </span>
    </button>

    <button class="tab-btn" role="tab" aria-selected="false"
            data-panel="panel-comm" onclick="show(this)">
      <span class="tab-emoji">👥</span>
      <span class="tab-text">
        <span class="tab-name">Community Holdings</span>
        <span class="tab-desc">Popular positions</span>
      </span>
    </button>

    <button class="tab-btn" role="tab" aria-selected="false"
            data-panel="panel-port" onclick="show(this)">
      <span class="tab-emoji">💼</span>
      <span class="tab-text">
        <span class="tab-name">Full Portfolio</span>
        <span class="tab-desc">May 24, 2026</span>
      </span>
    </button>

  </div>
</header>

<!-- REPORT PANELS -->
<main class="content">

  <div class="panel active" id="panel-buy" role="tabpanel">
    <div class="loading" id="load-buy">
      <div class="loading-spinner">📈</div>
      <span class="loading-msg">Loading report…</span>
    </div>
    <iframe src="BuySummary.html" title="What We Bought This Week"
            onload="loaded('load-buy')"></iframe>
  </div>

  <div class="panel" id="panel-sell" role="tabpanel">
    <div class="loading" id="load-sell">
      <div class="loading-spinner">📉</div>
      <span class="loading-msg">Loading report…</span>
    </div>
    <iframe src="SellSummary.html" title="What We Sold Recently" loading="lazy"
            onload="loaded('load-sell')"></iframe>
  </div>

  <div class="panel" id="panel-comm" role="tabpanel">
    <div class="loading" id="load-comm">
      <div class="loading-spinner">👥</div>
      <span class="loading-msg">Loading report…</span>
    </div>
    <iframe src="CommunityPortfolio.html" title="Community Holdings" loading="lazy"
            onload="loaded('load-comm')"></iframe>
  </div>

  <div class="panel" id="panel-port" role="tabpanel">
    <div class="loading" id="load-port">
      <div class="loading-spinner">💼</div>
      <span class="loading-msg">Loading report…</span>
    </div>
    <iframe src="ArmchairInsiderPortfolio.html" title="Full Portfolio" loading="lazy"
            onload="loaded('load-port')"></iframe>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <span class="footer-left">⚠️ For learning and discussion only — not financial advice</span>
  <span class="footer-right">Armchair Insider Lounge &nbsp;·&nbsp; May 2026</span>
</footer>

<script>
function show(btn) {
  // Deactivate all tabs
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  // Hide all panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  // Activate clicked tab
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');

  // Show target panel
  const target = document.getElementById(btn.dataset.panel);
  if (target) target.classList.add('active');
}

function loaded(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('done');
}

// Arrow key support
document.addEventListener('keydown', e => {
  const btns = [...document.querySelectorAll('.tab-btn')];
  const i = btns.findIndex(b => b.classList.contains('active'));
  if (e.key === 'ArrowRight' && i < btns.length - 1) btns[i + 1].click();
  if (e.key === 'ArrowLeft'  && i > 0)               btns[i - 1].click();
});
</script>

</body>
</html>
