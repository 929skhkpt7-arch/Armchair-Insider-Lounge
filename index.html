<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armchair Insider Lounge — Weekly Report Hub · May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #C9A84C;
  --gold-lt:   #E8C97A;
  --gold-pale: #FBF5E6;
  --gold-dim:  #A07830;
  --ink:       #18150F;
  --ink-mid:   #3D3628;
  --ink-lt:    #7A6F5E;
  --surface:   #FDFCF8;
  --surface-2: #F5F0E6;
  --border:    #E2D8C2;
  --green:     #1F6B47;
  --red:       #8B1A1A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  color: var(--surface);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP NAV BAR ── */
.topbar {
  background: var(--ink);
  background-image:
    radial-gradient(ellipse 80% 100% at 50% 200%, rgba(201,168,76,.18) 0%, transparent 60%);
  border-bottom: 1px solid rgba(201,168,76,.18);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* subtle grid overlay */
.topbar::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 56px, rgba(201,168,76,.025) 56px, rgba(201,168,76,.025) 57px);
}

/* ── BRAND ── */
.brand {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 14px 28px 14px 0;
  border-right: 1px solid rgba(201,168,76,.14);
  margin-right: 12px;
  flex-shrink: 0;
  text-decoration: none;
}

.brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  font-family: 'Playfair Display', serif;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(201,168,76,.35);
}

.brand-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.01em;
  line-height: 1;
}

.brand-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  line-height: 1;
}

/* ── TABS ── */
.tabs {
  display: flex;
  align-items: stretch;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 20px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.42);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .01em;
  white-space: nowrap;
  transition: color .18s, background .18s;
  position: relative;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}

.tab:hover {
  color: rgba(255,255,255,.75);
  background: rgba(201,168,76,.05);
}

.tab.active {
  color: #fff;
  border-bottom-color: var(--gold);
  background: rgba(201,168,76,.07);
}

.tab-icon {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: background .18s;
}

.tab-buy   .tab-icon { background: rgba(31,107,71,.25); color: #6DCFA0; }
.tab-sell  .tab-icon { background: rgba(139,26,26,.25); color: #EF9090; }
.tab-comm  .tab-icon { background: rgba(201,168,76,.22); color: var(--gold-lt); }
.tab-port  .tab-icon { background: rgba(26,63,111,.30); color: #7EB6EF; }

.tab.active .tab-buy-icon  { background: rgba(31,107,71,.40); }
.tab.active .tab-sell-icon { background: rgba(139,26,26,.40); }
.tab.active .tab-comm-icon { background: rgba(201,168,76,.35); }
.tab.active .tab-port-icon { background: rgba(26,63,111,.45); }

.tab-label {
  display: flex;
  flex-direction: column;
  gap: 1px;
  text-align: left;
}

.tab-title {
  font-size: 12.5px;
  font-weight: 600;
  line-height: 1;
}

.tab-date {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .07em;
  opacity: .6;
  text-transform: uppercase;
}

/* ── PERIOD BADGE ── */
.period-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 0 0 16px;
  border-left: 1px solid rgba(201,168,76,.14);
  margin-left: 8px;
  flex-shrink: 0;
}

.period-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

.period-val {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  background: rgba(201,168,76,.12);
  border: 1px solid rgba(201,168,76,.22);
  padding: 3px 9px;
  border-radius: 100px;
}

/* ── IFRAME CONTAINER ── */
.frame-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--surface);
}

.frame-panel {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity .28s ease;
}

.frame-panel.active {
  opacity: 1;
  pointer-events: all;
}

.frame-panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── LOADING STATE ── */
.frame-loader {
  position: absolute;
  inset: 0;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 5;
  transition: opacity .3s;
}

.frame-loader.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(201,168,76,.3); }
  50%       { transform: scale(1.06); box-shadow: 0 8px 32px rgba(201,168,76,.5); }
}

.loader-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-lt);
}

/* ── STATUS BAR ── */
.statusbar {
  background: rgba(24,21,15,.96);
  border-top: 1px solid rgba(201,168,76,.10);
  padding: 5px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .08em;
  color: rgba(255,255,255,.28);
  text-transform: uppercase;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: .6;
}

.status-item.highlight { color: rgba(201,168,76,.6); }
.status-sep { color: rgba(255,255,255,.12); }

/* ── MOBILE ADJUSTMENTS ── */
@media (max-width: 700px) {
  .brand-text { display: none; }
  .brand { padding-right: 16px; margin-right: 8px; }
  .period-badge { display: none; }
  .tab { padding: 0 14px; }
  .tab-date { display: none; }
  .topbar { padding: 0 14px; }
}

@media (max-width: 460px) {
  .tab { padding: 0 10px; gap: 6px; }
  .tab-icon { display: none; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topbar">

  <div class="brand">
    <div class="brand-icon">AI</div>
    <div class="brand-text">
      <span class="brand-name">Armchair Insider</span>
      <span class="brand-sub">Lounge · Weekly Hub</span>
    </div>
  </div>

  <div class="tabs" id="tabs">

    <button class="tab tab-buy active" data-panel="panel-buy" onclick="switchTab(this)">
      <div class="tab-icon tab-buy-icon">▲</div>
      <div class="tab-label">
        <span class="tab-title">Weekly Buys</span>
        <span class="tab-date">May 18 – 24, 2026</span>
      </div>
    </button>

    <button class="tab tab-sell" data-panel="panel-sell" onclick="switchTab(this)">
      <div class="tab-icon tab-sell-icon">▼</div>
      <div class="tab-label">
        <span class="tab-title">Recent Sells</span>
        <span class="tab-date">May 11 – 24, 2026</span>
      </div>
    </button>

    <button class="tab tab-comm" data-panel="panel-comm" onclick="switchTab(this)">
      <div class="tab-icon tab-comm-icon">◆</div>
      <div class="tab-label">
        <span class="tab-title">Community Portfolio</span>
        <span class="tab-date">Member Holdings</span>
      </div>
    </button>

    <button class="tab tab-port" data-panel="panel-port" onclick="switchTab(this)">
      <div class="tab-icon tab-port-icon">📊</div>
      <div class="tab-label">
        <span class="tab-title">Insider Portfolio</span>
        <span class="tab-date">May 24, 2026</span>
      </div>
    </button>

  </div>

  <div class="period-badge">
    <span class="period-label">Week</span>
    <span class="period-val">May 2026</span>
  </div>

</nav>

<!-- IFRAME PANELS -->
<div class="frame-container">

  <div class="frame-panel active" id="panel-buy">
    <div class="frame-loader" id="loader-buy">
      <div class="loader-icon">AI</div>
      <span class="loader-text">Loading buy summary…</span>
    </div>
    <iframe src="BuySummary.html" title="Weekly Buy Summary"
      onload="hideLoader('loader-buy')"></iframe>
  </div>

  <div class="frame-panel" id="panel-sell">
    <div class="frame-loader" id="loader-sell">
      <div class="loader-icon">AI</div>
      <span class="loader-text">Loading sell summary…</span>
    </div>
    <iframe src="SellSummary.html" title="Recent Sells" loading="lazy"
      onload="hideLoader('loader-sell')"></iframe>
  </div>

  <div class="frame-panel" id="panel-comm">
    <div class="frame-loader" id="loader-comm">
      <div class="loader-icon">AI</div>
      <span class="loader-text">Loading community portfolio…</span>
    </div>
    <iframe src="CommunityPortfolio.html" title="Community Portfolio" loading="lazy"
      onload="hideLoader('loader-comm')"></iframe>
  </div>

  <div class="frame-panel" id="panel-port">
    <div class="frame-loader" id="loader-port">
      <div class="loader-icon">AI</div>
      <span class="loader-text">Loading insider portfolio…</span>
    </div>
    <iframe src="ArmchairInsiderPortfolio.html" title="Armchair Insider Portfolio" loading="lazy"
      onload="hideLoader('loader-port')"></iframe>
  </div>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-item highlight">
    <div class="status-dot"></div>
    <span id="status-label">Weekly Buy Summary</span>
  </div>
  <span class="status-sep">·</span>
  <div class="status-item">
    <span>4 Reports Combined</span>
  </div>
  <span class="status-sep">·</span>
  <div class="status-item">
    <span>May 18 – 24, 2026</span>
  </div>
  <span class="status-sep">·</span>
  <div class="status-item">
    <span>For educational purposes only · Not financial advice</span>
  </div>
</div>

<script>
const TAB_LABELS = {
  'panel-buy':  'Weekly Buy Summary · May 18–24, 2026',
  'panel-sell': 'Recent Sells · May 11–24, 2026',
  'panel-comm': 'Community Portfolio Report',
  'panel-port': 'Armchair Insider Portfolio · May 24, 2026',
};

function switchTab(btn) {
  // Update tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  // Update panels
  const target = btn.dataset.panel;
  document.querySelectorAll('.frame-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(target).classList.add('active');

  // Update status
  document.getElementById('status-label').textContent = TAB_LABELS[target] || '';
}

function hideLoader(id) {
  const loader = document.getElementById(id);
  if (loader) {
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 400);
  }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const tabs = [...document.querySelectorAll('.tab')];
  const active = tabs.findIndex(t => t.classList.contains('active'));
  if (e.key === 'ArrowRight' && active < tabs.length - 1) {
    tabs[active + 1].click();
  } else if (e.key === 'ArrowLeft' && active > 0) {
    tabs[active - 1].click();
  }
});
</script>
</body>
</html>
